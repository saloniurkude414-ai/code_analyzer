<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Code Quality Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --python-blue: #306998;
            --python-light-blue: #4B8BBE;
            --python-yellow: #FFD43B;
            --python-light-yellow: #FFE873;
            --bg-dark: #0B1120;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(48, 105, 152, 0.25), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(255, 212, 59, 0.15), transparent 30%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            padding: 50px 30px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.4);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--python-light-blue), var(--python-yellow));
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .python-logo {
            width: 70px;
            height: 70px;
            filter: drop-shadow(0 0 15px rgba(255, 212, 59, 0.2));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-10px) rotate(2deg);
            }
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.15em;
            font-weight: 300;
            margin-top: 12px;
        }

        .upload-section {
            padding: 50px 40px;
            text-align: center;
            position: relative;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .file-input {
            display: none;
        }

        .btn {
            padding: 16px 36px;
            border-radius: 14px;
            font-size: 1.05em;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-upload {
            background: rgba(48, 105, 152, 0.15);
            color: #60A5FA;
            border: 1px solid rgba(48, 105, 152, 0.5);
        }

        .btn-upload:hover {
            background: rgba(48, 105, 152, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -10px var(--python-blue);
            color: #fff;
        }

        .btn-download {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-download:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--python-yellow), #F5B041);
            color: #1E293B;
            box-shadow: 0 6px 20px rgba(255, 212, 59, 0.3);
        }

        .btn-analyze:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 212, 59, 0.5);
            background: linear-gradient(135deg, #FFE873, var(--python-yellow));
        }

        .btn-analyze:disabled {
            background: #1E293B;
            color: #475569;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
            border: 1px solid #334155;
        }

        #fileName {
            color: var(--python-light-yellow);
            font-size: 1.15em;
            font-weight: 500;
            margin-bottom: 25px;
            min-height: 28px;
            padding: 10px 20px;
            background: rgba(255, 212, 59, 0.05);
            border-radius: 8px;
            display: inline-block;
            border: 1px dashed rgba(255, 212, 59, 0.3);
        }

        #fileName:empty {
            display: none;
        }

        .note {
            background: rgba(48, 105, 152, 0.15);
            color: var(--python-light-blue);
            padding: 18px 25px;
            border-radius: 12px;
            font-size: 1em;
            border: 1px solid rgba(48, 105, 152, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .loader.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(48, 105, 152, 0.2);
            border-top: 4px solid var(--python-yellow);
            border-right: 4px solid var(--python-blue);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 20px;
        }

        .loader p {
            color: var(--python-light-yellow);
            font-weight: 500;
            font-size: 1.1em;
            letter-spacing: 0.5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        .report-section {
            padding: 0 40px 50px;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .report-section.visible {
            display: block;
            opacity: 1;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            perspective: 1000px;
        }

        .card {
            background: rgba(15, 23, 42, 0.5);
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--python-blue), var(--python-yellow));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(30, 41, 59, 0.8);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card h3 {
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .card .value {
            font-size: 3.2em;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
            line-height: 1;
        }

        .card .subtitle {
            color: var(--python-light-blue);
            font-size: 0.95em;
            margin-top: 10px;
        }

        .score-card {
            background: linear-gradient(135deg, rgba(48, 105, 152, 0.2), rgba(255, 212, 59, 0.1));
            border: 1px solid rgba(255, 212, 59, 0.2);
        }

        .score-card .value {
            background: linear-gradient(135deg, var(--python-light-yellow), #FFF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-title {
            font-size: 1.5em;
            color: var(--text-main);
            margin: 40px 0 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .functions-list,
        .violations-list {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .function-item,
        .violation-item {
            background: rgba(30, 41, 59, 0.5);
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .function-item:last-child,
        .violation-item:last-child {
            margin-bottom: 0;
        }

        .function-item:hover,
        .violation-item:hover {
            transform: translateX(8px);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .function-item {
            border-left: 4px solid var(--python-blue);
        }

        .function-item:hover {
            border-color: var(--python-light-blue);
        }

        .violation-item {
            border-left: 4px solid #EF4444;
        }

        .violation-item:hover {
            border-color: #F87171;
        }

        .item-name {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.15em;
            color: #E2E8F0;
            font-weight: 600;
        }

        .violation-name {
            color: #FCA5A5;
        }

        .item-meta {
            color: var(--text-muted);
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .status-icon {
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-weight: 400;
            font-size: 1.1em;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #FCA5A5;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <img src="logo.png" alt="Python Logo" class="python-logo">
                <h1>Python Code Analyzer</h1>
            </div>
            <p>Elevate your code quality with deep analysis and naming convention checks</p>
        </div>

        <div class="upload-section">
            <div class="button-group">
                <input type="file" id="fileInput" class="file-input" accept=".py">
                <label for="fileInput" class="btn btn-upload" id="fileLabel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload Python File
                </label>

                <button class="btn btn-download" id="downloadBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download Test File
                </button>

                <button class="btn btn-analyze" id="analyzeBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Analyze Code
                </button>
            </div>

            <div id="fileName" style="display: none;"></div>

            <div class="note">
                <span style="font-size: 1.2em;">💡</span> Tip: Click "Download Test File" to get a sample Python file
                with mixed conventions to see the analyzer in action!
            </div>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Running deep analysis on your file...</p>
        </div>

        <div class="report-section" id="reportSection">
            <div id="reportContent"></div>
        </div>
    </div>

    <script>
        const testFileContent = `def valid_snake_case(param1):
    # This is a sample function
    pass

def invalidCamelCaseFunction():
    """
    This function has a multiline comment (docstring)
    and an invalid name.
    """
    print("Hello")

def AnotherInvalidOne():
    # Another comment here
    pass

def calculate_total_price(items):
    total = 0
    for item in items:
        total += item.price
    return total

def FetchUserData(user_id):
    # This should be fetch_user_data
    return {"id": user_id, "name": "John"}

class SampleClass:
    def __init__(self):
        pass
    
    def classMethod(self):
        pass

def processData():
    # Invalid name - should be process_data
    pass

if __name__ == "__main__":
    print("Hello World")
`;

        document.getElementById('downloadBtn').addEventListener('click', function () {
            const blob = new Blob([testFileContent], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'test_file.py';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);

            const fnDiv = document.getElementById('fileName');
            fnDiv.innerHTML = '✨ <span style="color: #fff">test_file.py</span> downloaded! Upload it to test.';
            fnDiv.style.display = 'inline-block';
        });

        document.getElementById('fileInput').addEventListener('change', function (e) {
            const fnDiv = document.getElementById('fileName');
            if (e.target.files[0]) {
                fnDiv.innerHTML = `📄 Selected: <span style="color: #fff">${e.target.files[0].name}</span>`;
                fnDiv.style.display = 'inline-block';
                document.getElementById('analyzeBtn').disabled = false;
            } else {
                fnDiv.style.display = 'none';
                document.getElementById('analyzeBtn').disabled = true;
            }
        });

        document.getElementById('analyzeBtn').addEventListener('click', function () {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;

            const reader = new FileReader();

            document.getElementById('loader').classList.add('visible');
            document.getElementById('reportSection').classList.remove('visible');

            reader.onload = function (e) {
                setTimeout(() => {
                    const content = e.target.result;
                    const report = analyzeCode(content, file.name);
                    displayReport(report);
                    document.getElementById('loader').classList.remove('visible');
                }, 800);
            };

            reader.readAsText(file);
        });

        function analyzeCode(content, filename) {
            const lines = content.split('\n');
            const totalLines = lines.length;

            let commentLines = 0;
            let inMultilineComment = false;

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                if (trimmed.startsWith('"""') || trimmed.startsWith("'''")) {
                    if (trimmed.split('"""').length - 1 === 2 || trimmed.split("'''").length - 1 === 2) {
                        commentLines++;
                    } else {
                        inMultilineComment = !inMultilineComment;
                        commentLines++;
                    }
                } else if (inMultilineComment) {
                    commentLines++;
                } else if (trimmed.startsWith('#')) {
                    commentLines++;
                }
            });

            const functions = [];
            const snakeCaseViolations = [];
            const functionPattern = /^\s*def\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/;
            const snakeCasePattern = /^[a-z][a-z0-9]*(_[a-z0-9]+)*$/;

            lines.forEach((line, index) => {
                const match = line.match(functionPattern);
                if (match) {
                    const funcName = match[1];
                    if (!(funcName.startsWith('__') && funcName.endsWith('__'))) {
                        functions.push({
                            name: funcName,
                            line: index + 1
                        });

                        // Strict check: if not snake_case
                        if (!snakeCasePattern.test(funcName)) {
                            snakeCaseViolations.push({
                                name: funcName,
                                line: index + 1
                            });
                        }
                    }
                }
            });

            const commentRatio = totalLines > 0 ? (commentLines / totalLines) * 100 : 0;
            let qualityScore = 100;

            if (commentRatio < 10) qualityScore -= 20;
            else if (commentRatio < 20) qualityScore -= 10;

            if (functions.length > 0) {
                qualityScore -= (snakeCaseViolations.length / functions.length) * 30;
            }

            qualityScore = Math.max(0, Math.min(100, Math.round(qualityScore)));

            return {
                file_name: filename,
                total_lines: totalLines,
                comment_lines: commentLines,
                comment_ratio: Math.round(commentRatio * 10) / 10,
                total_functions: functions.length,
                functions: functions,
                snake_case_violations: snakeCaseViolations,
                quality_score: qualityScore
            };
        }

        function displayReport(report) {
            if (report.error) {
                document.getElementById('reportContent').innerHTML = `
                    <div class="error">${report.error}</div>
                `;
                document.getElementById('reportSection').classList.add('visible');
                return;
            }

            let html = `
                <div class="summary">
                    <div class="card">
                        <h3>Total Lines</h3>
                        <div class="value">${report.total_lines}</div>
                        <div class="subtitle">Lines of Code</div>
                    </div>
                    <div class="card">
                        <h3>Comments</h3>
                        <div class="value">${report.comment_lines}</div>
                        <div class="subtitle">${report.comment_ratio}% Coverage</div>
                    </div>
                    <div class="card">
                        <h3>Functions</h3>
                        <div class="value">${report.total_functions}</div>
                        <div class="subtitle">Defined Blocks</div>
                    </div>
                    <div class="card score-card">
                        <h3>Code Quality</h3>
                        <div class="value">${report.quality_score}</div>
                        <div class="subtitle">Score out of 100</div>
                    </div>
                </div>
                
                <h2 class="section-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--python-light-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Detected Functions
                </h2>
                <div class="functions-list">
            `;

            if (report.functions.length > 0) {
                report.functions.forEach(func => {
                    const isValid = !report.snake_case_violations.some(v => v.name === func.name);
                    html += `
                        <div class="function-item">
                            <span class="item-name">${func.name}()</span>
                            <span class="item-meta">
                                Line ${func.line}
                                <span class="status-icon" style="color: ${isValid ? '#34D399' : '#F87171'}">
                                    ${isValid ?
                            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>' :
                            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>'}
                                </span>
                            </span>
                        </div>
                    `;
                });
            } else {
                html += '<div class="no-data">No functions detected in this file.</div>';
            }

            html += `
                </div>
                
                <h2 class="section-title" style="margin-top: 50px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    Naming Convention Alerts
                </h2>
                <div class="violations-list">
            `;

            if (report.snake_case_violations.length > 0) {
                report.snake_case_violations.forEach(violation => {
                    html += `
                        <div class="violation-item">
                            <span class="item-name violation-name">${violation.name}()</span>
                            <span class="item-meta">
                                Line ${violation.line}
                                <span style="font-size:0.85em; text-transform:uppercase; letter-spacing:0.5px; color:#FCA5A5;">Non-Snake Case</span>
                            </span>
                        </div>
                    `;
                });
            } else {
                html += '<div class="no-data" style="color: #34D399; border-color: rgba(52, 211, 153, 0.3); background: rgba(52, 211, 153, 0.05);">All functions follow perfect snake_case conventions! 🎉</div>';
            }

            html += '</div>';

            document.getElementById('reportContent').innerHTML = html;
            document.getElementById('reportSection').classList.add('visible');

            // Scroll to results smoothly
            setTimeout(() => {
                document.getElementById('reportSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }
